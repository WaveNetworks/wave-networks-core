# docker-compose.yml (admin standalone — for admin-only development/testing)
#
# IMPORTANT: In normal use, admin is started through a child app's
# docker-compose.yml, NOT this file. This standalone config exists
# for admin-only development (e.g. working on admin core without a child app).
#
# If you have a child app, use its docker-compose.yml instead — it includes
# admin as a read-only mount with all databases properly namespaced.

services:
  app:
    build: .
    ports:
      - "80:80"
    environment:
      - ENVIRONMENT=development
      - DB_HOST_MAIN=db
      - DB_NAME_MAIN=admin_standalone_main
      - DB_USER=root
      - DB_PASSWORD=dev_root_password_123
      - DB_HOST_SHARD=db_shard
      - DB_NAME_SHARD=admin_standalone_shard_1
      - DB_HOST_SHARD2=db_shard2
      - DB_NAME_SHARD2=admin_standalone_shard_2
      - FILES_LOCATION=/var/files/
      - SMTP_HOST=mailhog
      - SMTP_PORT=1025
      - MAIL_FROM=noreply@localhost
      - MAIL_FROM_NAME=Wave Networks
      - APP_SECRET=dev_app_secret_64_chars_xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx
      - HIDDEN_HASH=dev_hidden_hash_xxxxxxxxxxxxxxxxxx
      - SEED_TEST_DATA=true
    volumes:
      - .:/var/www/public_html/admin:ro
      - admin_vendor:/var/www/public_html/admin/vendor
      - files_vol:/var/files
    depends_on:
      db:
        condition: service_healthy
      db_shard:
        condition: service_healthy
      db_shard2:
        condition: service_healthy

  db:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: dev_root_password_123
      MYSQL_DATABASE: admin_standalone_main
    volumes:
      - db_main:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 3s
      retries: 10

  db_shard:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: dev_root_password_123
      MYSQL_DATABASE: admin_standalone_shard_1
    volumes:
      - db_shard1:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 3s
      retries: 10

  db_shard2:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: dev_root_password_123
      MYSQL_DATABASE: admin_standalone_shard_2
    volumes:
      - db_shard2:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 3s
      retries: 10

  mailhog:
    image: mailhog/mailhog
    ports:
      - "8025:8025"

  playwright:
    profiles: ["testing"]
    build:
      context: tests/
      dockerfile: Dockerfile.playwright
    depends_on:
      - app

volumes:
  files_vol:
  admin_vendor:
  db_main:
  db_shard1:
  db_shard2:
