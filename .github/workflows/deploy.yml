name: Deploy Wave Networks Admin

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout admin
        uses: actions/checkout@v4
        with:
          path: admin

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: gd, mbstring, xml, curl, zip, pdo_mysql

      - name: Install composer dependencies
        run: composer install --no-dev --no-interaction --optimize-autoloader
        working-directory: admin

      - name: Prepare deploy staging
        run: |
          mkdir -p staging/admin

          rsync -a --exclude='.git' --exclude='node_modules' --exclude='tests' \
            --exclude='test' --exclude='docker' --exclude='.docker' \
            --exclude='.env' --exclude='.env.example' --exclude='docker-compose.yml' \
            --exclude='docker-compose.yaml' --exclude='Dockerfile' --exclude='.dockerignore' \
            --exclude='CLAUDE.md' --exclude='CHILD_APP_SPEC.md' --exclude='phpunit.xml' \
            --exclude='phpunit.xml.dist' --exclude='.editorconfig' --exclude='config/config.php' \
            --exclude='deploy.py' --exclude='deploy_config.py' --exclude='deploy_config.sample.py' \
            --exclude='__pycache__' --exclude='.github' --exclude='.claude' \
            admin/ staging/admin/

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ssh.us.stackcp.com >> ~/.ssh/known_hosts 2>/dev/null

      - name: Deploy via rsync
        run: |
          RSYNC_OPTS="-avz --delete-after --chmod=D755,F644"
          SSH_CMD="ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no"

          echo "Deploying admin..."
          rsync $RSYNC_OPTS -e "$SSH_CMD" \
            staging/admin/ dswa.org@ssh.us.stackcp.com:public_html/admin/

          echo "Deploy complete."
