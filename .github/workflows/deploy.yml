name: Deploy Wave Networks Admin

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout admin
        uses: actions/checkout@v4
        with:
          path: admin

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: gd, mbstring, xml, curl, zip, pdo_mysql

      - name: Install composer dependencies
        run: composer install --no-dev --no-interaction --optimize-autoloader
        working-directory: admin

      - name: Prepare deploy staging
        run: |
          mkdir -p staging/admin

          rsync -a --exclude='.git' --exclude='node_modules' --exclude='tests' \
            --exclude='test' --exclude='docker' --exclude='.docker' \
            --exclude='.env' --exclude='.env.example' --exclude='docker-compose.yml' \
            --exclude='docker-compose.yaml' --exclude='Dockerfile' --exclude='.dockerignore' \
            --exclude='CLAUDE.md' --exclude='CLAUDE-*.md' --exclude='CHILD_APP_SPEC.md' \
            --exclude='phpunit.xml' --exclude='phpunit.xml.dist' --exclude='.editorconfig' \
            --exclude='config/config.php' \
            --exclude='deploy.py' --exclude='deploy_config.py' --exclude='deploy_config.sample.py' \
            --exclude='__pycache__' --exclude='.github' --exclude='.claude' \
            admin/ staging/admin/

      - name: Validate staging directory
        run: |
          ADMIN_COUNT=$(find staging/admin -type f | wc -l)
          echo "staging/admin file count: $ADMIN_COUNT"
          if [ "$ADMIN_COUNT" -lt 10 ]; then
            echo "ERROR: staging/admin has fewer than 10 files ($ADMIN_COUNT). Aborting deploy."
            exit 1
          fi

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.SSH_HOST }} >> ~/.ssh/known_hosts 2>/dev/null

      - name: Deploy to subtheme.com
        run: |
          RSYNC_OPTS="-avz --delete-after --chmod=D755,F644"
          SSH_CMD="ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no"
          TARGET="${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}"

          echo "Deploying admin to subtheme.com..."
          rsync $RSYNC_OPTS --exclude='config/config.php' -e "$SSH_CMD" \
            staging/admin/ $TARGET:public_html/admin/

          echo "Deploy complete."
